name: Deploy to OCI

on:
  push:
    branches: [main]
  workflow_dispatch: # 수동 실행 버튼

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH로 서버 배포
        env:
          SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          HOST: ${{ secrets.OCI_HOST }}
          USER: ${{ secrets.OCI_USER }}
          # 개인 프롬프트는 공개 저장소에 두지 않고 시크릿에서 서버로 내려준다
          PROMPT_DE_AI: ${{ secrets.PROMPT_DE_AI_WRITING }}
          PROMPT_RESUME: ${{ secrets.PROMPT_RESUME_REVIEW }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 멀티라인 프롬프트를 base64로 인코딩해 안전하게 전송 (인용/개행 문제 회피)
          DE_AI_B64=$(printf '%s' "$PROMPT_DE_AI" | base64 | tr -d '\n')
          RESUME_B64=$(printf '%s' "$PROMPT_RESUME" | base64 | tr -d '\n')
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "$USER@$HOST" "
            set -e
            cd ~/telegram-bot
            PREV=\$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main
            mkdir -p workspace/prompts
            echo '$DE_AI_B64' | base64 -d > workspace/prompts/de-ai-writing-prompt.md
            echo '$RESUME_B64' | base64 -d > workspace/prompts/resume-review-master-prompt.md
            .venv/bin/pip install -q -r requirements.txt
            # 새 코드 문법 검사 — 깨졌으면 이전 커밋으로 되돌리고 중단 (라이브 봇이 크래시 루프에 안 빠지게)
            .venv/bin/python -m py_compile bot.py || { echo '❌ bot.py 문법 오류 — 이전 커밋 유지, 배포 중단'; git reset --hard \$PREV; exit 1; }
            # 유닛테스트 — 로직 회귀가 있으면 이전 커밋으로 되돌리고 중단
            .venv/bin/python -m unittest discover -s tests -t . || { echo '❌ 테스트 실패 — 이전 커밋 유지, 배포 중단'; git reset --hard \$PREV; exit 1; }
            # 작업 중이면(.busy 존재) 끝날 때까지 최대 5분 기다렸다가 재시작 (진행 중 작업이 끊기지 않게)
            for i in \$(seq 1 60); do
              [ -f workspace/.busy ] || break
              echo \"작업 중… 재시작 대기 (\$i/60)\"; sleep 5
            done
            sudo systemctl restart claude-bot
            sleep 6
            # 기동 실패면 이전 커밋으로 자동 롤백 (라이브 봇을 살려둔다)
            systemctl is-active --quiet claude-bot || { echo '❌ 기동 실패 — 이전 커밋으로 롤백'; git reset --hard \$PREV; sudo systemctl restart claude-bot; sleep 6; systemctl is-active claude-bot; exit 1; }
            journalctl -u claude-bot --no-pager -n 4 -o cat
          "
